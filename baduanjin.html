<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>八段锦 - 文化挖掘库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: sans-serif;
            background-color: #f3f4f6;
            padding-top: 60px;
        }

        h1, h2 {
            font-family: 'ZCOOL KuaiLe', cursive;
        }

        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.4s ease, box-shadow 0.4s ease, background 0.4s ease;
            opacity: 0;
            transform: translateY(30px);
        }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.25);
            background: linear-gradient(135deg, #ffffff, #fff7f3);
        }

        .animate-fade-in {
            animation: fadeInUp 0.8s forwards;
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        a { transition: color 0.3s; }
        a:hover { color: #b91c1c; }

        .btn-return {
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn-return:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(185, 28, 28, 0.4);
        }

        /* 导航栏 */
        #nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-blur: 5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 0.5rem 1rem;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lang-btn {
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #b91c1c;
        }

        .lang-btn.active {
            background: #b91c1c;
            color: #fff;
        }

        [data-lang] { display: none; }
        [data-lang].show { display: block; }
    </style>
</head>

<body>

    <!-- 导航栏 -->
    <nav id="nav">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-red-700 font-bold text-lg font-['ZCOOL_KuaiLe']">武术文化项目</a>
            <div class="flex gap-4 items-center">
                <a href="index.html" class="text-gray-700 hover:text-red-700">首页</a>
                <div class="flex gap-1">
                    <div class="lang-btn" id="btnZh">中</div>
                    <div class="lang-btn" id="btnEn">EN</div>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto p-10">
        <!-- 中文内容 -->
        <div data-lang="zh">
            <h1 class="text-4xl font-bold mb-8 text-center text-red-700">八段锦</h1>
            <div class="space-y-6">
                <!-- 保留原有中文内容不变 -->
                <!-- 示例 -->
                <div class="card animate-fade-in" style="animation-delay: 0s;">
                    <p class="leading-relaxed mb-6">
                        八段锦（Baduanjin，eight-section brocade），是一种在中国古代发明并流传于民间的传统健身术……
                    </p>
                    <!-- ... 其余内容省略，保持原样 ... -->
                </div>
            </div>
        </div>

        <!-- 英文内容 -->
        <div data-lang="en">
            <h1 class="text-4xl font-bold mb-8 text-center text-red-700">Baduanjin</h1>
            <div class="space-y-6">
                <div class="card animate-fade-in" style="animation-delay: 0s;">
                    <p class="leading-relaxed mb-6">
                        Baduanjin (八段锦, eight-section brocade) is a traditional Chinese exercise developed in ancient China…
                    </p>
                    <!-- ... 其余英文内容省略，保持原样 ... -->
                </div>
            </div>
        </div>

        <div class="mt-12 text-center">
            <a id="btnReturn" href="culture.html" class="btn-return inline-block bg-red-700 text-white px-6 py-3 rounded-lg font-medium transition-colors">
                ← 返回文化挖掘库
            </a>
        </div>
    </div>

    <script>
        // 语言切换逻辑
        function setLang(lang) {
            localStorage.setItem('lang', lang);
            document.querySelectorAll('[data-lang]').forEach(el => {
                el.classList.toggle('show', el.dataset.lang === lang);
            });
            document.getElementById('btnReturn').textContent = lang === 'zh' ? '← 返回文化挖掘库' : '← Back to Cultural Excavation Library';
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(lang === 'zh' ? 'btnZh' : 'btnEn').classList.add('active');
        }

        const savedLang = localStorage.getItem('lang') || 'zh';
        setLang(savedLang);

        document.getElementById('btnZh').onclick = () => setLang('zh');
        document.getElementById('btnEn').onclick = () => setLang('en');

        // 滚动显示导航
        window.addEventListener('scroll', function () {
            const nav = document.getElementById('nav');
            nav.style.opacity = window.scrollY > 50 ? '1' : '0';
        });
    </script>
</body>
</html>
