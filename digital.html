<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-10">

    <h1 class="text-3xl font-bold mb-6">数智体验场</h1>

    <!-- 360展示 -->
    <iframe width="100%" height="500" src="https://momento360.com/e/u/xxxx">
    </iframe>

    <!-- 简单互动 -->
    <button onclick="showInfo()" class="bg-blue-500 text-white p-2 mt-6">
        点击查看兵器介绍
    </button>

    <p id="info" class="mt-4"></p>

    <script>
        function showInfo() {
            document.getElementById("info").innerText = "这是长枪：古代主要兵器之一。";
        }
    </script>

</body>

</html>
