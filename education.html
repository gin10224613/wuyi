<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>教育融合</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-10 bg-gray-100">

    <h1 class="text-3xl font-bold mb-6">教育融合模块</h1>

    <div class="grid md:grid-cols-3 gap-6">

        <div class="bg-white p-6 shadow rounded">
            <h2 class="font-bold text-lg mb-2">小学阶段：启蒙与体验</h2>
            <p>
                以游戏化、情境化教学为核心，通过趣味动作、互动任务与故事引导，
                激发学生对传统武术的兴趣，培养基础身体协调能力与文化认知。
            </p>
        </div>

        <div class="bg-white p-6 shadow rounded">
            <h2 class="font-bold text-lg mb-2">中学阶段：理解与思辨</h2>
            <p>
                引入武术背后的历史背景与文化价值，结合课堂讨论与项目学习，
                引导学生思考“武术与社会”“传统与现代”的关系，
                提升文化理解力与批判性思维。
            </p>
        </div>

        <div class="bg-white p-6 shadow rounded">
            <h2 class="font-bold text-lg mb-2">大学阶段：国际与创新</h2>
            <p>
                面向国际传播需求，构建双语课程体系，
                结合数字媒体、跨文化传播与创意表达，
                推动中国武术文化走向全球语境。
            </p>
        </div>

    </div>

</body>

</html>
