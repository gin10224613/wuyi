<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文化挖掘库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: sans-serif;
            background-color: #f3f4f6;
        }

        h1, h2 {
            font-family: 'ZCOOL KuaiLe', cursive;
        }

        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-blur: 5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 1rem 2rem;
            z-index: 50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: opacity 0.3s ease;
        }

        .nav a {
            font-weight: bold;
            color: #b91c1c;
            margin-left: 1rem;
            transition: color 0.3s;
        }

        .nav a:hover {
            color: #7f1d1d;
        }

        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.4s ease, box-shadow 0.4s ease, background 0.4s ease;
            opacity: 0;
            transform: translateY(30px);
        }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.25);
            background: linear-gradient(135deg, #ffffff, #fff7f3);
        }

        .animate-fade-in {
            animation: fadeInUp 0.8s forwards;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-return {
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-return:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(185, 28, 28, 0.4);
        }

        .lang-btn {
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            margin-left: 0.5rem;
            border: 1px solid #b91c1c;
            font-weight: bold;
        }

        .lang-btn.active {
            background-color: #b91c1c;
            color: white;
        }

        [data-lang] {
            display: none;
        }

        [data-lang].show {
            display: block;
        }
    </style>
</head>

<body class="pt-28 px-6">

    <!-- 导航栏 -->
    <div class="nav" id="nav">
        <div class="text-xl font-bold text-red-700">文化挖掘库</div>
        <div>
            <span id="btnZh" class="lang-btn active">中文</span>
            <span id="btnEn" class="lang-btn">English</span>
        </div>
    </div>

    <div class="max-w-5xl mx-auto">

        <!-- 八段锦内容 -->
        <div data-lang="zh" class="show">
            <h1 class="text-4xl font-bold mb-8 text-center text-red-700">八段锦</h1>
            <div class="space-y-6">
                <div class="card animate-fade-in" style="animation-delay: 0s;">
                    <p class="leading-relaxed mb-6">
                        八段锦（Baduanjin，eight-section brocade），是一种在中国古代发明并流传于民间的传统健身术，是中国古代导引术的一个重要分支，内容包括肢体运动和气息调理...
                    </p>
                    <img src="https://aka.doubaocdn.com/s/6qIx1wIgtM" alt="八段锦全套动作" class="rounded shadow w-full max-w-2xl mx-auto">
                </div>
            </div>
        </div>

        <div data-lang="en">
            <h1 class="text-4xl font-bold mb-8 text-center text-red-700">Baduanjin</h1>
            <div class="space-y-6">
                <div class="card animate-fade-in" style="animation-delay: 0s;">
                    <p class="leading-relaxed mb-6">
                        Baduanjin (八段锦, eight-section brocade) is a traditional Chinese exercise developed in ancient China. It includes body movements and breath regulation...
                    </p>
                    <img src="https://aka.doubaocdn.com/s/6qIx1wIgtM" alt="Baduanjin full set" class="rounded shadow w-full max-w-2xl mx-auto">
                </div>
            </div>
        </div>

        <div class="mt-10 text-center">
            <a href="culture.html" 
               class="btn-return inline-block bg-red-700 text-white px-6 py-3 rounded-lg hover:bg-red-900 font-medium transition-colors"
               data-text-zh="← 返回文化挖掘库"
               data-text-en="← Back to Cultural Excavation Library">
               ← 返回文化挖掘库
            </a>
        </div>

    </div>

    <script>
        const btnZh = document.getElementById('btnZh');
        const btnEn = document.getElementById('btnEn');
        const returnBtn = document.querySelector('.btn-return');
        const langElements = document.querySelectorAll('[data-lang]');

        function setLanguage(lang) {
            langElements.forEach(el => {
                el.classList.toggle('show', el.getAttribute('data-lang') === lang);
            });

            btnZh.classList.toggle('active', lang === 'zh');
            btnEn.classList.toggle('active', lang === 'en');

            if (returnBtn) {
                returnBtn.textContent = returnBtn.getAttribute(`data-text-${lang}`);
            }

            localStorage.setItem('lang', lang);
        }

        btnZh.addEventListener('click', () => setLanguage('zh'));
        btnEn.addEventListener('click', () => setLanguage('en'));

        const defaultLang = localStorage.getItem('lang') || 'zh';
        setLanguage(defaultLang);

        // 导航栏滚动效果（可选）
        const nav = document.getElementById('nav');
        window.addEventListener('scroll', () => {
            nav.style.opacity = window.scrollY > 50 ? '1' : '0.95';
        });
    </script>

</body>
</html>
